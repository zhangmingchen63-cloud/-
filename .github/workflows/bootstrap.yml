name: Bootstrap repository content

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract verified local project archive
        shell: bash
        run: |
          test -f bootstrap.tar.gz
          tar -xzf bootstrap.tar.gz
          rm bootstrap.tar.gz

      - name: Commit project files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Netlify intelligence workbench"
          git push
